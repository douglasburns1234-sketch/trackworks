<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trackworks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --steel:#1B1D1B; --panel:#242624; --panel-2:#2E302E;
    --yellow:#F4B400; --yellow-dim:#7a5c04;
    --blue:#6A9ABF; --green:#6BAF72; --teal:#4CA58A;
    --paper:#EAE6DB; --paper-dim:#A8A59C; --concrete:#6E6F6A;
    --rust:#C1542C; --line:#353835;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--steel);color:var(--paper);font-family:'Inter',sans-serif;min-height:100vh;}
  ::selection{background:var(--yellow);color:#1B1D1B;}

  .tread{height:7px;width:100%;background-image:repeating-linear-gradient(108deg,var(--yellow) 0,var(--yellow) 12px,transparent 12px,transparent 24px);}
  .tread.dim{background-image:repeating-linear-gradient(108deg,var(--line) 0,var(--line) 12px,transparent 12px,transparent 24px);}
  .tread.thin{height:4px;}

  header{border-bottom:1px solid var(--line);padding:16px 36px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;}
  .brand{display:flex;align-items:baseline;gap:10px;cursor:pointer;}
  .brand .mark{font-family:'Oswald',sans-serif;font-weight:700;font-size:21px;letter-spacing:1.5px;color:var(--yellow);}
  .brand .tag{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--concrete);letter-spacing:2px;text-transform:uppercase;}
  .header-right{display:flex;align-items:center;gap:20px;}
  nav.crumbs{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--concrete);}
  .crumb-link{cursor:pointer;}.crumb-link:hover{color:var(--yellow);}
  .sep{margin:0 8px;color:var(--line);}.cur-crumb{color:var(--paper);}
  .submit-nav-btn{font-family:'JetBrains Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:var(--teal);background:none;border:1px solid var(--teal);padding:7px 14px;cursor:pointer;opacity:0.8;white-space:nowrap;}
  .submit-nav-btn:hover{opacity:1;}
  .donate-nav-btn{font-family:'JetBrains Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:var(--yellow);background:none;border:1px solid var(--yellow-dim);padding:7px 14px;cursor:pointer;text-decoration:none;opacity:0.85;white-space:nowrap;display:inline-block;}
  .donate-nav-btn:hover{opacity:1;border-color:var(--yellow);}

  main{max-width:1120px;margin:0 auto;padding:0 36px 100px;}

  .hero{padding:60px 0 36px;}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--yellow);letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;}
  .hero h1{font-family:'Oswald',sans-serif;font-weight:600;font-size:50px;line-height:1.06;letter-spacing:0.3px;max-width:740px;margin-bottom:16px;}
  .hero p{font-size:15px;color:var(--paper-dim);max-width:540px;line-height:1.65;}

  .stats-band{display:flex;gap:0;border:1px solid var(--line);margin-top:40px;}
  .stat-block{flex:1;padding:18px 22px;border-right:1px solid var(--line);}
  .stat-block:last-child{border-right:none;}
  .stat-block .n{font-family:'Oswald',sans-serif;font-size:28px;font-weight:600;color:var(--yellow);}
  .stat-block .l{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--concrete);text-transform:uppercase;letter-spacing:1px;margin-top:4px;}

  section{padding:48px 0 0;}
  h2.sh{font-family:'Oswald',sans-serif;font-weight:600;font-size:22px;letter-spacing:0.3px;margin-bottom:4px;}
  p.ss{color:var(--concrete);font-size:12.5px;margin-bottom:22px;}

  .cat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1px;background:var(--line);border:1px solid var(--line);}
  .cat-card{background:var(--panel);padding:26px 22px;cursor:pointer;transition:background 0.13s;position:relative;}
  .cat-card:hover{background:var(--panel-2);}
  .cat-icon{font-size:30px;margin-bottom:16px;}
  .cat-card h3{font-family:'Oswald',sans-serif;font-size:18px;font-weight:500;margin-bottom:6px;}
  .cat-card .count{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--concrete);text-transform:uppercase;letter-spacing:1px;}
  .cat-arr{position:absolute;top:22px;right:20px;color:var(--yellow);opacity:0;transform:translateX(-4px);transition:all 0.13s;}
  .cat-card:hover .cat-arr{opacity:1;transform:translateX(0);}

  .model-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:1px;background:var(--line);border:1px solid var(--line);}
  .mc{background:var(--panel);cursor:pointer;transition:background 0.13s;display:flex;flex-direction:column;}
  .mc:hover{background:var(--panel-2);}
  .mc-thumb{height:150px;background:var(--panel-2);display:flex;align-items:center;justify-content:center;font-size:52px;border-bottom:1px solid var(--line);position:relative;overflow:hidden;}
  .mc-thumb-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;}
  .platform-badge{position:absolute;top:10px;left:10px;font-family:'JetBrains Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:1px;padding:3px 8px;border:1px solid var(--line);background:var(--panel);color:var(--paper-dim);z-index:2;}
  .design-badge{position:absolute;top:10px;right:10px;font-family:'JetBrains Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:1px;padding:3px 8px;border:1px solid;background:var(--panel);z-index:2;}
  .design-badge.free{color:var(--green);border-color:#2d4a30;}
  .design-badge.paid{color:var(--yellow);border-color:var(--yellow-dim);}
  .mc-body{padding:18px 18px 20px;flex:1;display:flex;flex-direction:column;gap:10px;}
  .mc-scale{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--yellow);letter-spacing:1px;text-transform:uppercase;}
  .mc-body h3{font-family:'Oswald',sans-serif;font-size:18px;font-weight:500;}
  .mc-body p{font-size:13px;color:var(--paper-dim);line-height:1.55;flex:1;}
  .mc-designer{display:flex;align-items:center;gap:8px;padding-top:12px;border-top:1px solid var(--line);}
  .da{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;font-family:'Oswald',sans-serif;background:var(--yellow-dim);color:var(--yellow);flex-shrink:0;}
  .mc-designer .dname{font-size:12px;color:var(--paper-dim);}
  .mc-designer .dname strong{color:var(--paper);font-weight:500;}
  .mc-metrics{display:flex;gap:16px;flex-wrap:wrap;}
  .mc-metric{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--concrete);}
  .mc-metric span{color:var(--paper-dim);}

  .detail-top{display:grid;grid-template-columns:300px 1fr;gap:40px;padding:52px 0 0;align-items:start;}
  .det-thumb{height:260px;background:var(--panel);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:90px;position:relative;overflow:hidden;}
  .det-thumb-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .det-info .scale-row{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--yellow);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
  .det-info h1{font-family:'Oswald',sans-serif;font-size:36px;font-weight:600;margin-bottom:14px;line-height:1.1;}
  .det-info p.desc{color:var(--paper-dim);font-size:14.5px;line-height:1.65;margin-bottom:22px;max-width:560px;}
  .designer-block{border:1px solid var(--line);padding:16px 18px;margin-bottom:22px;display:flex;align-items:center;gap:14px;background:var(--panel);}
  .da-lg{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;font-family:'Oswald',sans-serif;background:var(--yellow-dim);color:var(--yellow);flex-shrink:0;}
  .d-label{font-family:'JetBrains Mono',monospace;font-size:9.5px;text-transform:uppercase;letter-spacing:1px;color:var(--concrete);margin-bottom:3px;}
  .d-name{font-family:'Oswald',sans-serif;font-size:17px;font-weight:500;color:var(--paper);}
  .d-source{font-size:12px;color:var(--paper-dim);}
  .d-source a{color:var(--blue);text-decoration:none;}.d-source a:hover{text-decoration:underline;}
  .d-price{font-family:'JetBrains Mono',monospace;font-size:11.5px;margin-top:5px;text-transform:uppercase;letter-spacing:0.5px;}
  .d-price.free{color:var(--green);}
  .d-price.paid{color:var(--yellow);}
  .d-link{margin-left:auto;}
  .ext-btn{font-family:'JetBrains Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:0.8px;color:var(--paper);background:none;border:1px solid var(--line);padding:8px 14px;cursor:pointer;text-decoration:none;display:inline-block;white-space:nowrap;}
  .ext-btn:hover{border-color:var(--yellow);color:var(--yellow);}
  .metrics-strip{display:flex;gap:1px;background:var(--line);border:1px solid var(--line);margin-bottom:26px;flex-wrap:wrap;}
  .ms-block{flex:1;background:var(--panel);padding:14px 16px;min-width:100px;}
  .ms-block .mk{font-family:'JetBrains Mono',monospace;font-size:9.5px;text-transform:uppercase;letter-spacing:1px;color:var(--concrete);margin-bottom:5px;}
  .ms-block .mv{font-family:'Oswald',sans-serif;font-size:22px;font-weight:500;color:var(--paper);}
  .ms-block .mv.hi{color:var(--yellow);}.ms-block .mv.cost{color:var(--green);}.ms-block .mv.filament{color:var(--blue);}

  .tabs{display:flex;border-bottom:1px solid var(--line);margin-top:44px;flex-wrap:wrap;}
  .tab-btn{font-family:'Oswald',sans-serif;font-size:13.5px;letter-spacing:0.5px;text-transform:uppercase;background:none;border:none;color:var(--concrete);padding:13px 0;margin-right:34px;cursor:pointer;border-bottom:2px solid transparent;position:relative;top:1px;}
  .tab-btn.active{color:var(--paper);border-bottom:2px solid var(--yellow);}
  .tab-btn:hover:not(.active){color:var(--paper-dim);}
  .tab-panel{display:none;padding:32px 0 0;}.tab-panel.active{display:block;}

  .ov-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:44px;}
  .ov-head{font-family:'Oswald',sans-serif;font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--yellow);margin-bottom:12px;}
  .ov-grid li,.ov-grid p{font-size:13.5px;color:var(--paper-dim);line-height:1.7;}
  ul{padding-left:18px;}
  .print-reqs{border:1px solid var(--line);}
  .pr-row{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:12px;padding:10px 16px;border-bottom:1px solid var(--line);}
  .pr-row:last-child{border-bottom:none;}
  .pr-row span:first-child{color:var(--concrete);}.pr-row span:last-child{color:var(--paper-dim);}

  .upgrade-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1px;background:var(--line);border:1px solid var(--line);}
  .upg-card{background:var(--panel);padding:20px;display:flex;flex-direction:column;gap:10px;}
  .upg-type{font-family:'JetBrains Mono',monospace;font-size:9.5px;padding:4px 8px;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;align-self:flex-start;background:rgba(76,165,138,0.12);color:var(--teal);border:1px solid #2d5548;}
  .upg-card h4{font-family:'Oswald',sans-serif;font-size:16px;font-weight:500;}
  .upg-card p.upg-note{font-size:12.5px;color:var(--paper-dim);line-height:1.6;flex:1;}
  .upg-credit{display:flex;align-items:center;gap:8px;padding-top:10px;border-top:1px solid var(--line);}
  .upg-credit .dname{font-size:11.5px;color:var(--concrete);flex:1;}
  .upg-credit .dname strong{color:var(--paper-dim);font-weight:500;}
  .upg-link{font-family:'JetBrains Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:0.5px;color:var(--teal);text-decoration:none;white-space:nowrap;}
  .upg-link:hover{text-decoration:underline;}

  .parts-section-head{font-family:'Oswald',sans-serif;font-size:14px;text-transform:uppercase;letter-spacing:1px;color:var(--yellow);margin:28px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--line);}
  .parts-section-head:first-child{margin-top:0;}
  .own-notice{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--teal);padding:12px 16px;margin-bottom:14px;font-size:12.5px;color:var(--paper-dim);}
  .own-notice strong{color:var(--teal);font-weight:500;}
  table.parts{width:100%;border-collapse:collapse;font-size:13px;}
  table.parts thead th{text-align:left;font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--concrete);border-bottom:1px solid var(--line);padding:0 16px 12px 0;font-weight:400;}
  table.parts tbody td{padding:13px 16px 13px 0;border-bottom:1px solid var(--line);vertical-align:middle;}
  table.parts tbody tr:hover td{background:var(--panel);}
  table.parts.own-table tbody td{opacity:0.65;}
  .part-name{font-weight:500;color:var(--paper);margin-bottom:2px;}.part-sku{font-family:'JetBrains Mono',monospace;color:var(--concrete);font-size:11px;}
  .part-qty{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--paper-dim);}
  .stock{font-family:'JetBrains Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:0.5px;}
  .stock.in{color:#8fbf6b;}.stock.low{color:var(--yellow);}.stock.out{color:var(--rust);}
  .price-cell{font-family:'JetBrains Mono',monospace;color:var(--paper);}
  .best-tag{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--steel);background:var(--green);padding:2px 5px;margin-left:7px;vertical-align:middle;}
  .own-tag{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--steel);background:var(--teal);padding:2px 5px;margin-left:7px;vertical-align:middle;}
  .buy-btn{font-family:'JetBrains Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:0.8px;color:var(--paper);background:none;border:1px solid var(--line);padding:6px 12px;cursor:pointer;text-decoration:none;display:inline-block;white-space:nowrap;}
  .buy-btn:hover{border-color:var(--yellow);color:var(--yellow);}
  .bom-total{display:flex;justify-content:flex-end;align-items:center;gap:16px;padding:16px 0 0;border-top:1px solid var(--line);margin-top:2px;}
  .bom-total .label{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--concrete);text-transform:uppercase;letter-spacing:1px;}
  .bom-total .amount{font-family:'Oswald',sans-serif;font-size:24px;color:var(--green);}
  .price-note{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--concrete);margin-top:12px;line-height:1.7;}
  .price-note .dot{color:var(--green);}

  /* SUBMISSION PAGE */
  .submit-page{padding:52px 0 0;max-width:760px;}
  .submit-page h1{font-family:'Oswald',sans-serif;font-size:36px;font-weight:600;margin-bottom:12px;}
  .submit-page .lede{font-size:14.5px;color:var(--paper-dim);line-height:1.65;margin-bottom:36px;max-width:600px;}
  .process-steps{display:flex;gap:1px;background:var(--line);border:1px solid var(--line);margin-bottom:36px;}
  .ps{flex:1;background:var(--panel);padding:18px 16px;}
  .ps .pn{font-family:'Oswald',sans-serif;font-size:24px;color:var(--yellow);margin-bottom:6px;}
  .ps .pk{font-size:13px;color:var(--paper);font-weight:500;margin-bottom:4px;}
  .ps .pd{font-size:12px;color:var(--concrete);line-height:1.6;}
  .form-card{border:1px solid var(--line);background:var(--panel);padding:28px;}
  .form-row{margin-bottom:22px;}
  .form-row label{display:block;font-family:'JetBrains Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:var(--concrete);margin-bottom:8px;}
  .form-row .hint{font-size:12px;color:var(--concrete);margin-top:6px;line-height:1.55;}
  .form-row input,.form-row select,.form-row textarea{width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--paper);font-family:'Inter',sans-serif;font-size:14px;padding:11px 14px;outline:none;transition:border-color 0.15s;}
  .form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--teal);}
  .form-row textarea{resize:vertical;min-height:100px;line-height:1.6;}
  .form-row select option{background:var(--panel-2);}
  .form-2col{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  .submit-btn{font-family:'Oswald',sans-serif;font-size:15px;letter-spacing:1px;text-transform:uppercase;background:var(--teal);color:var(--steel);border:none;padding:14px 28px;cursor:pointer;font-weight:600;width:100%;margin-top:8px;transition:opacity 0.15s;}
  .submit-btn:hover{opacity:0.88;}
  .form-footer-note{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--concrete);margin-top:14px;line-height:1.7;text-align:center;}
  .submit-success{border:1px solid var(--teal);background:rgba(76,165,138,0.08);padding:28px;text-align:center;margin-top:20px;display:none;}
  .submit-success h3{font-family:'Oswald',sans-serif;font-size:22px;color:var(--teal);margin-bottom:10px;}
  .submit-success p{font-size:13.5px;color:var(--paper-dim);line-height:1.65;}

  footer{border-top:1px solid var(--line);padding:26px 36px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--concrete);letter-spacing:0.5px;line-height:1.8;}
  .footer-credit{color:var(--paper-dim);margin-top:4px;font-size:10px;}
  .back-link{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--concrete);cursor:pointer;margin-top:28px;}
  .back-link:hover{color:var(--yellow);}

  @media(max-width:720px){
    .detail-top,.ov-grid,.form-2col{grid-template-columns:1fr;}
    .stats-band,.metrics-strip,.process-steps{flex-direction:column;}
    .stat-block{border-right:none;border-bottom:1px solid var(--line);}
    header{padding:14px 18px;}main{padding:0 18px 60px;}
    .hero h1{font-size:34px;}.submit-page h1{font-size:28px;}
  }
</style>
</head>
<body>

<header>
  <div class="brand" onclick="goHome()">
    <span class="mark">TRACKWORKS</span>
    <span class="tag">RC build registry</span>
  </div>
  <div class="header-right">
    <nav class="crumbs" id="crumbs"></nav>
    <span id="donate-slot"></span>
    <button class="submit-nav-btn" onclick="goSubmit()">Submit a design ↗</button>
  </div>
</header>
<div class="tread"></div>
<main id="app"></main>

<footer>
  All designers are credited; models link to their original published sources.
  <div class="footer-credit">Trackworks does not host model files. All intellectual property belongs to the original designers.</div>
  <div class="footer-credit" id="affiliate-disclosure"></div>
</footer>

<!-- Load the data file first, then the app logic -->
<script>
/* ============================================================
   TRACKWORKS — DATA FILE
   ============================================================
   This is the ONLY file you need to edit to manage the site.

   It is split into four sections:
     1. SETTINGS          — filament price etc.
     2. SHARED PARTS      — things builders may already own
     3. DESIGNERS         — credit for each designer
     4. MODELS            — the actual build entries

   IMPORTANT RULES:
   • Every line that holds data ends with a comma (,)
     The very last item in a list does NOT need one — but
     adding one anyway never breaks anything.
   • Text values must sit inside "quote marks"
   • Numbers must NOT have quote marks  (142 not "142")
   • If you're unsure, copy an existing entry and change
     the values — don't change the structure.
   ============================================================ */


/* ============================================================
   SECTION 1 — SETTINGS
   ============================================================ */

const SETTINGS = {

  // Cost per kg of filament in £. Change this one number
  // and all estimated build costs update automatically.
  filamentCostPerKg: 22,

  // Your contact email — shown on the submission page
  contactEmail: "your@email.com",

  // Site title shown in the browser tab
  siteTitle: "Trackworks — RC Build Repository",

  // ── MONEY SETTINGS ──────────────────────────────────────
  // Leave any of these as "" to hide that feature — nothing
  // breaks, the related button/link just won't show up.

  // Your Amazon Associates tracking ID (e.g. "trackworks-21").
  // Once set, every Amazon link on the site — in every model's
  // parts list and the shared "you may already own" list —
  // automatically gets your affiliate tag added. You don't
  // need to edit any of the retailer links yourself.
  amazonAffiliateTag: "",

  // Your Ko-fi or Buy Me a Coffee page link.
  // Once set, a "Support this site" button appears in the
  // header on every page.
  donationUrl: "",

};


/* ============================================================
   SECTION 2 — SHARED PARTS
   ============================================================
   Parts that appear on every build's "you may already own"
   list. These are NOT included in the build cost total.

   TO ADD A SHARED PART — copy one block below, paste it
   before the final ]; and fill in the fields.

   Fields:
     name      The component name shown on the page
     sku       A short reference code (you can make these up)
     note      One sentence explaining why it's "shared"
     options   One or more retailers — add as many as you like
               Each option needs: retailer, price, url
   ============================================================ */

const SHARED_PARTS = [

  {
    name: "Radio transmitter (3+ channel)",
    sku: "TX-3CH+",
    note: "Works across all builds. FlySky FS-i6 is popular for beginners.",

<script>

/* ── HELPERS ─────────────────────────────────────────────── */
function bomTotal(m){
  return m.parts.reduce((s,p)=>s+(p.options.reduce((a,b)=>a.price<b.price?a:b).price*(p.qty||1)),0);
}
function filamentCost(g){
  return (g/1000*SETTINGS.filamentCostPerKg).toFixed(2);
}
function totalEst(m){
  return (bomTotal(m)+parseFloat(filamentCost(m.filamentG))+(m.designCost||0)).toFixed(2);
}
function formatDesignCost(n){
  return (!n || n===0) ? 'Free' : '£'+n.toFixed(2);
}
function initials(n){
  return n.replace(/[^A-Za-z ]/g,'').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();
}

/* Adds your Amazon Associates tag to any Amazon link automatically.
   Leaves every other retailer's link untouched. */
function affiliateUrl(url){
  if(!SETTINGS.amazonAffiliateTag) return url;
  if(!/amazon\./i.test(url)) return url;
  if(/[?&]tag=/i.test(url)) return url; // already tagged, don't double up
  const sep = url.includes('?') ? '&' : '?';
  return url + sep + 'tag=' + encodeURIComponent(SETTINGS.amazonAffiliateTag);
}

/* ── STATE & URL ROUTING ─────────────────────────────────────
   Every major page (home / category / model / submit) updates
   the address bar, so the browser's back and forward buttons
   work properly, and links can be shared or bookmarked directly
   to a category or model.

   Switching tabs on a model page (overview/upgrades/parts) also
   updates the address bar for shareability, but deliberately
   does NOT add its own "back" stop — pressing back from any tab
   takes you straight out of the model page, not tab-by-tab.
   ───────────────────────────────────────────────────────────── */
let S={view:'home',cat:null,model:null,tab:'overview'};

function goHome(){ location.hash = '#/'; }
function openCat(id){ location.hash = '#/category/' + encodeURIComponent(id); }
function openModel(id){ location.hash = '#/model/' + encodeURIComponent(id); }
function goSubmit(){ location.hash = '#/submit'; }

function setTab(t){
  S.tab = t;
  if(S.view==='model' && S.model){
    history.replaceState(null, '', '#/model/' + encodeURIComponent(S.model) + '/' + encodeURIComponent(t));
  }
  render();
}

// Reads the current address bar hash and updates S to match.
// Runs on page load and every time the hash changes — including
// when the user clicks the browser's back or forward button.
function syncStateFromHash(){
  const raw = location.hash.replace(/^#\/?/, '');
  const parts = raw.split('/').filter(Boolean).map(decodeURIComponent);

  if(parts[0]==='category' && parts[1] && CATEGORIES.some(c=>c.id===parts[1])){
    S = { view:'cat', cat: parts[1] };
  } else if(parts[0]==='model' && parts[1] && MODELS.some(m=>m.id===parts[1])){
    const tab = ['overview','upgrades','parts'].includes(parts[2]) ? parts[2] : 'overview';
    S = { view:'model', model: parts[1], tab };
  } else if(parts[0]==='submit'){
    S = { view:'submit' };
  } else {
    S = { view:'home' };
  }
  render();
}

window.addEventListener('hashchange', syncStateFromHash);

/* ── RENDER ──────────────────────────────────────────────── */
function render(){
  const app=document.getElementById('app');
  const crumbs=document.getElementById('crumbs');

  /* HOME */
  if(S.view==='home'){
    crumbs.innerHTML=`<span class="cur-crumb">All vehicle types</span>`;
    document.title=SETTINGS.siteTitle;
    const totalHours=MODELS.reduce((a,m)=>a+m.printHours,0);
    const totalParts=MODELS.reduce((a,m)=>a+m.parts.length,0);
    app.innerHTML=`
      <div class="hero">
        <div class="eyebrow">RC build registry</div>
        <h1>The RC construction<br>vehicle build database.</h1>
        <p>Browse 3D-printed RC construction machines designed by the community. Review print specs, upgrade paths, and get a priced bill of materials — with links to the best-value parts.</p>
      </div>
      <div class="tread thin dim"></div>
      <div class="stats-band">
        <div class="stat-block"><div class="n">${MODELS.length}</div><div class="l">Models indexed</div></div>
        <div class="stat-block"><div class="n">${Object.keys(DESIGNERS).length}</div><div class="l">Designers credited</div></div>
        <div class="stat-block"><div class="n">${totalHours.toLocaleString()}</div><div class="l">Total print hours</div></div>
        <div class="stat-block"><div class="n">${totalParts}</div><div class="l">Parts tracked</div></div>
        <div class="stat-block"><div class="n">4</div><div class="l">Source platforms</div></div>
      </div>
      <section>
        <h2 class="sh">Vehicle types</h2>
        <p class="ss">Select a type to browse models</p>
        <div class="cat-grid">
          ${CATEGORIES.map(c=>{
            const n=MODELS.filter(m=>m.category===c.id).length;
            return `<div class="cat-card" onclick="openCat('${c.id}')">
              <span class="cat-arr">→</span>
              <div class="cat-icon">${c.icon}</div>
              <h3>${c.name}</h3>
              <div class="count">${n} model${n!==1?'s':''}</div>
            </div>`;
          }).join('')}
        </div>
      </section>`;
    return;
  }

  /* CATEGORY */
  if(S.view==='cat'){
    const cat=CATEGORIES.find(c=>c.id===S.cat);
    const models=MODELS.filter(m=>m.category===cat.id);
    crumbs.innerHTML=`<span class="crumb-link" onclick="goHome()">All types</span><span class="sep">/</span><span class="cur-crumb">${cat.name}</span>`;
    app.innerHTML=`
      <section style="padding-top:52px;">
        <h2 class="sh">${cat.name}</h2>
        <p class="ss">${cat.desc} · ${models.length} model${models.length!==1?'s':''}</p>
        <div class="model-grid">
          ${models.map(m=>{
            const d=DESIGNERS[m.designer];
            return `<div class="mc" onclick="openModel('${m.id}')">
              <div class="mc-thumb">
                <span class="platform-badge">${m.source}</span>${m.icon}
                <span class="design-badge ${m.designCost>0?'paid':'free'}">${formatDesignCost(m.designCost)}</span>
                ${m.image ? `<img class="mc-thumb-img" src="${PLACEHOLDER_IMAGES[m.image] || ('images/'+m.image)}" alt="${m.name}" onerror="this.remove()">` : ''}
              </div>
              <div class="mc-body">
                <div class="mc-scale">Scale ${m.scale} · ${m.difficulty}</div>
                <h3>${m.name}</h3>
                <p>${m.desc}</p>
                <div class="mc-metrics">
                  <div class="mc-metric"><span>${m.printHours} hr</span> print</div>
                  <div class="mc-metric"><span>${m.filamentG} g</span> filament</div>
                  <div class="mc-metric"><span>~£${totalEst(m)}</span> est.</div>
                </div>
                <div class="mc-designer">
                  <div class="da">${initials(d.fullName)}</div>
                  <div class="dname">Design by <strong>${d.handle}</strong></div>
                </div>
              </div>
            </div>`;
          }).join('')}
        </div>
        <div class="back-link" onclick="goHome()">← back to vehicle types</div>
      </section>`;
    return;
  }

  /* MODEL DETAIL */
  if(S.view==='model'){
    const m=MODELS.find(x=>x.id===S.model);
    const cat=CATEGORIES.find(c=>c.id===m.category);
    const d=DESIGNERS[m.designer];
    const bom=bomTotal(m).toFixed(2);
    const fil=filamentCost(m.filamentG);
    const total=totalEst(m);
    document.title=`${m.name} — Trackworks`;
    crumbs.innerHTML=`
      <span class="crumb-link" onclick="goHome()">All types</span><span class="sep">/</span>
      <span class="crumb-link" onclick="openCat('${cat.id}')">${cat.name}</span><span class="sep">/</span>
      <span class="cur-crumb">${m.name}</span>`;

    app.innerHTML=`
      <div class="detail-top">
        <div class="det-thumb">
          ${m.icon}
          ${m.image ? `<img class="det-thumb-img" src="${PLACEHOLDER_IMAGES[m.image] || ('images/'+m.image)}" alt="${m.name}" onerror="this.remove()">` : ''}
        </div>
        <div class="det-info">
          <div class="scale-row">Scale ${m.scale} · ${m.difficulty} · ${m.source}</div>
          <h1>${m.name}</h1>
          <p class="desc">${m.desc}</p>
          <div class="designer-block">
            <div class="da-lg">${initials(d.fullName)}</div>
            <div>
              <div class="d-label">Original design by</div>
              <div class="d-name">${d.handle}</div>
              <div class="d-source">Published on <a href="${d.profileUrl}" target="_blank">${d.platform} ↗</a> · ${d.note}</div>
              <div class="d-price ${m.designCost>0?'paid':'free'}">${m.designCost>0 ? `${formatDesignCost(m.designCost)} to download` : 'Free to download'}</div>
            </div>
            <div class="d-link"><a class="ext-btn" href="${m.sourceUrl}" target="_blank">View on ${m.source} ↗</a></div>
          </div>
          <div class="metrics-strip">
            <div class="ms-block"><div class="mk">Print time</div><div class="mv hi">${m.printHours} hr</div></div>
            <div class="ms-block"><div class="mk">Filament</div><div class="mv filament">${m.filamentG} g</div></div>
            <div class="ms-block"><div class="mk">Filament cost</div><div class="mv filament">~£${fil}</div></div>
            <div class="ms-block"><div class="mk">Design file</div><div class="mv ${m.designCost>0?'':'cost'}">${formatDesignCost(m.designCost)}</div></div>
            <div class="ms-block"><div class="mk">Electronics &amp; parts</div><div class="mv">~£${bom}</div></div>
            <div class="ms-block"><div class="mk">Full build est.</div><div class="mv cost">~£${total}</div></div>
          </div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab-btn ${S.tab==='overview'?'active':''}" onclick="setTab('overview')">Overview</button>
        <button class="tab-btn ${S.tab==='upgrades'?'active':''}" onclick="setTab('upgrades')">Upgrades</button>
        <button class="tab-btn ${S.tab==='parts'?'active':''}" onclick="setTab('parts')">Parts &amp; buy list</button>
      </div>

      <div class="tab-panel ${S.tab==='overview'?'active':''}">
        <div class="ov-grid">
          <div>
            <div class="ov-head">Build features</div>
            <ul>${(m.features||[]).map(f=>`<li>${f}</li>`).join('')}</ul>
          </div>
          <div>
            <div class="ov-head">Print requirements</div>
            <div class="print-reqs">
              <div class="pr-row"><span>Material</span><span>${m.material||'—'}</span></div>
              <div class="pr-row"><span>Filament needed</span><span>${m.filamentG} g (~${(m.filamentG/1000).toFixed(2)} kg)</span></div>
              <div class="pr-row"><span>Bed size</span><span>${m.bed||'—'}</span></div>
              <div class="pr-row"><span>Print settings</span><span>${m.tolerances||'—'}</span></div>
              <div class="pr-row"><span>Estimated print time</span><span>~${m.printHours} hr</span></div>
            </div>
          </div>
        </div>
      </div>

      <div class="tab-panel ${S.tab==='upgrades'?'active':''}">
        <p class="ss" style="margin-bottom:18px;">Other printable designs that work with this build — alternative buckets, cabs, attachments and more, credited to their own designers.</p>
        ${(m.upgrades&&m.upgrades.length) ? `
        <div class="upgrade-grid">
          ${m.upgrades.map(u=>`
            <div class="upg-card">
              <span class="upg-type">${u.type}</span>
              <h4>${u.name}</h4>
              <p class="upg-note">${u.note}</p>
              <div class="upg-credit">
                <span class="dname">By <strong>${u.designer}</strong> · ${u.platform}</span>
                <a class="upg-link" href="${u.sourceUrl}" target="_blank">View ↗</a>
              </div>
            </div>`).join('')}
        </div>` : `<p class="ss">No companion designs listed for this model yet.</p>`}
      </div>

      <div class="tab-panel ${S.tab==='parts'?'active':''}">
        <div class="parts-section-head">Build-specific parts</div>
        <table class="parts">
          <thead><tr>
            <th style="width:36%">Component</th><th>Qty</th><th>Stock</th>
            <th>Best price</th><th>Retailer</th><th></th>
          </tr></thead>
          <tbody>
            ${m.parts.map(p=>{
              const best=p.options.reduce((a,b)=>a.price<b.price?a:b);
              const sl={in:'In stock',low:'Low stock',out:'Out of stock'}[p.stock];
              return `<tr>
                <td><div class="part-name">${p.name}</div><div class="part-sku">${p.sku}</div></td>
                <td class="part-qty">×${p.qty||1}</td>
                <td><span class="stock ${p.stock}">${sl}</span></td>
                <td class="price-cell">£${best.price.toFixed(2)}<span class="best-tag">best</span></td>
                <td class="part-sku">${best.retailer}</td>
                <td><a class="buy-btn" href="${affiliateUrl(best.url)}" target="_blank">Buy ↗</a></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>

        <div class="parts-section-head">You may already own these</div>
        <div class="own-notice">
          <strong>Shared kit items</strong> — these work across multiple builds and are not included in the total below.
        </div>
        <table class="parts own-table">
          <thead><tr>
            <th style="width:36%">Component</th><th>Qty</th><th></th>
            <th>Price if needed</th><th>Retailer</th><th></th>
          </tr></thead>
          <tbody>
            ${SHARED_PARTS.map(p=>{
              const best=p.options.reduce((a,b)=>a.price<b.price?a:b);
              return `<tr>
                <td><div class="part-name">${p.name}</div><div class="part-sku" style="color:var(--concrete)">${p.note}</div></td>
                <td class="part-qty">×1</td>
                <td><span class="own-tag">shared</span></td>
                <td class="price-cell">£${best.price.toFixed(2)}</td>
                <td class="part-sku">${best.retailer}</td>
                <td><a class="buy-btn" href="${affiliateUrl(best.url)}" target="_blank">Buy ↗</a></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>

        <div class="bom-total">
          <span class="label">Electronics &amp; parts</span>
          <span class="amount">£${bom}</span>
        </div>
        <div class="bom-total" style="margin-top:6px;">
          <span class="label">Design file (${d.handle})</span>
          <span class="amount">${formatDesignCost(m.designCost)}</span>
        </div>
        <div class="bom-total" style="margin-top:6px;">
          <span class="label">+ filament ~£${fil} = build total</span>
          <span class="amount">~£${total}</span>
        </div>
        <p class="price-note">
          <span class="dot">●</span> Best price shown across listed retailers · filament costed at ~£${SETTINGS.filamentCostPerKg}/kg · design file cost goes to the designer, not Trackworks · shared items not included in total
        </p>
      </div>

      <div class="back-link" onclick="openCat('${cat.id}')">← back to ${cat.name}</div>`;
    return;
  }

  /* SUBMISSION */
  if(S.view==='submit'){
    crumbs.innerHTML=`<span class="crumb-link" onclick="goHome()">Home</span><span class="sep">/</span><span class="cur-crumb">Submit a design</span>`;
    app.innerHTML=`
      <div class="submit-page">
        <div class="eyebrow">Designer submissions</div>
        <h1>Submit your build</h1>
        <p class="lede">Designed an RC construction vehicle you'd like listed here? Share the link below. Every submission is reviewed before going live — once approved, your design is credited to you with a link back to the original.</p>
        <div class="process-steps">
          <div class="ps"><div class="pn">01</div><div class="pk">Submit a link</div><div class="pd">Paste the URL to your model on Thingiverse, Cults3D, Printables, or MyMiniFactory.</div></div>
          <div class="ps"><div class="pn">02</div><div class="pk">Review</div><div class="pd">The design is checked to confirm it's an RC construction vehicle with enough detail to build a useful entry.</div></div>
          <div class="ps"><div class="pn">03</div><div class="pk">Goes live</div><div class="pd">Once approved, your handle and profile link are credited on every page for your build.</div></div>
        </div>
        <div class="form-card">
          <div class="form-row">
            <label>Model page URL <span style="color:var(--yellow)">*</span></label>
            <input type="url" id="f-url" placeholder="https://www.thingiverse.com/thing:...">
            <div class="hint">Direct link to the model on Thingiverse, Cults3D, Printables, or MyMiniFactory.</div>
          </div>
          <div class="form-2col">
            <div class="form-row">
              <label>Your designer handle <span style="color:var(--yellow)">*</span></label>
              <input type="text" id="f-handle" placeholder="e.g. Burnie222">
            </div>
            <div class="form-row">
              <label>Platform <span style="color:var(--yellow)">*</span></label>
              <select id="f-platform">
                <option value="">Select platform…</option>
                <option>Thingiverse</option><option>Cults3D</option>
                <option>Printables</option><option>MyMiniFactory</option><option>Other</option>
              </select>
            </div>
          </div>
          <div class="form-2col">
            <div class="form-row">
              <label>Vehicle type <span style="color:var(--yellow)">*</span></label>
              <select id="f-type">
                <option value="">Select type…</option>
                <option>Dozer</option><option>Excavator</option>
                <option>Skid steer</option><option>Dump truck</option><option>Other</option>
              </select>
            </div>
            <div class="form-row">
              <label>Approximate scale</label>
              <input type="text" id="f-scale" placeholder="e.g. 1:14">
            </div>
          </div>
          <div class="form-row">
            <label>Anything else to share?</label>
            <textarea id="f-notes" placeholder="Unusual electronics, known issues, companion models, or anything that would help build a useful entry…"></textarea>
          </div>
          <button class="submit-btn" onclick="handleSubmit()">Submit for review</button>
          <p class="form-footer-note">
            Trackworks does not host model files. Submitting a link does not transfer any rights — your work stays yours.<br>
            You'll be credited with your handle and a link back to your original published page.
          </p>
        </div>
        <div class="submit-success" id="submit-success">
          <h3>Submission received</h3>
          <p>Thanks — it's in the review queue. If the build is approved, it'll go live with full credit to your handle.</p>
        </div>
        <div class="back-link" onclick="goHome()">← back to home</div>
      </div>`;
    return;
  }
}

function handleSubmit(){
  const url=document.getElementById('f-url').value.trim();
  const handle=document.getElementById('f-handle').value.trim();
  const platform=document.getElementById('f-platform').value;
  const type=document.getElementById('f-type').value;
  if(!url||!handle||!platform||!type){
    alert('Please fill in all required fields (marked *).');
    return;
  }
  document.querySelector('.form-card').style.opacity='0.4';
  document.querySelector('.form-card').style.pointerEvents='none';
  document.getElementById('submit-success').style.display='block';
}

/* ── ONE-TIME PAGE SETUP ─────────────────────────────────────
   Runs once when the site loads. Shows the donate button and
   the affiliate disclosure only if you've filled in the
   relevant SETTINGS in data.js — otherwise they stay hidden. */
function initMoneyFeatures(){
  if(SETTINGS.donationUrl){
    document.getElementById('donate-slot').innerHTML =
      `<a class="donate-nav-btn" href="${SETTINGS.donationUrl}" target="_blank">Support this site ↗</a>`;
  }
  if(SETTINGS.amazonAffiliateTag){
    document.getElementById('affiliate-disclosure').textContent =
      'As an Amazon Associate, Trackworks earns from qualifying purchases. Some links on this site may earn a small commission at no extra cost to you.';
  }
}

// PREVIEW-ONLY demo values — not present in the real data.js
SETTINGS.donationUrl = 'https://ko-fi.com/example';
SETTINGS.amazonAffiliateTag = 'trackworks-21';
initMoneyFeatures();
syncStateFromHash();
</script>
</body>
